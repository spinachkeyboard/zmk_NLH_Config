name: Draw Keymaps

on:
  workflow_dispatch:
  push:
    paths:
      - 'config/*.keymap'
      - '.github/workflows/keymap-drawer.yaml'
      - 'keymap_drawer.config.yaml'
      - 'boards/shields/nlh_split/nlh_split-layouts.dtsi'

permissions:
  contents: write

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: 'config/*.keymap'
      output_folder: keymap-drawer
      config_path: keymap_drawer.config.yaml
      west_config_path: 'config'
      amend_commit: true
